<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match Challenge</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="memory.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Memory Match Challenge</a>

            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light btn-sm">Retour au portfolio</a>
            </div>
        </div>
    </nav>

    <main class="game-wrapper">

        <section class="intro-panel text-center">
            <h1>Memory Match Challenge</h1>
            <p>
                Un jeu de mémoire où tu dois retrouver les paires identiques.
                Choisis un niveau, un thème, puis teste ta mémoire.
            </p>
        </section>

        <section class="setup-panel">
            <h2>Configuration du jeu</h2>

            <div class="row g-3">

                <div class="col-md-6">
                    <label for="levelSelect" class="form-label">Niveau</label>
                    <select id="levelSelect" class="form-select">
                        <option value="easy">Débutant - 8 cartes</option>
                        <option value="medium">Intermédiaire - 12 cartes</option>
                        <option value="hard">Avancé - 16 cartes</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="themeSelect" class="form-label">Thème des images</label>
                    <select id="themeSelect" class="form-select">
                        <option value="animals">Animaux</option>
                        <option value="sports">Sports</option>
                        <option value="tech">Technologie</option>
                    </select>
                </div>

            </div>

            <button id="startBtn" class="btn btn-primary w-100 mt-4">
                Commencer le jeu
            </button>
        </section>

        <section class="stats-panel">
            <div>
                <span class="stat-label">Coups</span>
                <strong id="moves">0</strong>
            </div>

            <div>
                <span class="stat-label">Paires trouvées</span>
                <strong id="pairs">0</strong>
            </div>

            <div>
                <span class="stat-label">Niveau</span>
                <strong id="currentLevel">Débutant</strong>
            </div>
        </section>

        <section id="gameBoard" class="game-board"></section>

        <section id="messageBox" class="message-box d-none"></section>

        <section class="text-center mt-4">
            <button id="restartBtn" class="btn btn-dark">
                Recommencer
            </button>
        </section>

    </main>

    <footer>
        <p>Designed by Sami Diouf · SEG3525</p>
    </footer>

    <script src="memory.js"></script>
</body>
</html>
