<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Tableau de bord interactif bilingue présentant des statistiques synthétiques de football."
    >

    <title>Football Performance Dashboard</title>

    <link rel="stylesheet" href="analytics.css">
</head>

<body>

    <div id="root"></div>

    <!-- React -->
    <script
        src="https://unpkg.com/react@18/umd/react.development.js"
        crossorigin>
    </script>

    <script
        src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
        crossorigin>
    </script>

    <!-- Babel permet d'utiliser JSX directement dans le navigateur -->
    <script
        src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>

    <!-- Chart.js pour créer les graphiques -->
    <script
        src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js">
    </script>

    <!-- Notre code React -->
    <script
        type="text/babel"
        src="analytics.js">
    </script>

</body>
</html>
